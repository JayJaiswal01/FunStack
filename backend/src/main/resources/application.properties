spring.application.name=backend
server.port=8080

# Using H2 Database for immediate usability (College Project standard)
spring.datasource.url=jdbc:h2:mem:funstackdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Optional: Keep MySQL settings commented out for reference
# spring.datasource.url=jdbc:mysql://localhost:3306/funstack?createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=password

spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
